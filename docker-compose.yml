services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: playto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: ./backend
    command: sh -c "python manage.py migrate --no-input && gunicorn playto.wsgi:application --bind 0.0.0.0:8000 --workers 2 --reload"
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1
      CORS_ALLOWED_ORIGINS: http://localhost:5175
    depends_on:
      - db
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api-auth/login/')"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build: ./backend
    command: celery -A playto worker -l info -c 2
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started

  beat:
    build: ./backend
    command: celery -A playto beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playto
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8001
    ports:
      - "5175:5173"
    volumes:
      - ./frontend/src:/app/src

volumes:
  pgdata:
