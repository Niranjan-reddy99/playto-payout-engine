# Render Blueprint — deploys all backend services in one click.
# Prerequisites before deploying:
#   1. Create a free Upstash Redis account at https://upstash.com
#      and copy the Redis URL (starts with rediss://)
#   2. Click "New Blueprint" in Render dashboard and point it at this repo.
#   3. Fill in the three "sync: false" env vars when Render asks:
#        REDIS_URL           → your Upstash Redis URL
#        CORS_ALLOWED_ORIGINS → your Vercel frontend URL (after deploying frontend)
#        CSRF_TRUSTED_ORIGINS → same as CORS_ALLOWED_ORIGINS
#   4. After deploy, run the seed script:
#        render ssh playto-api
#        python manage.py seed_data

databases:
  - name: playto-db
    databaseName: playto
    plan: free

services:
  # ── API (web server) ─────────────────────────────────────────────────────────
  - type: web
    name: playto-api
    env: docker
    rootDir: backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        sync: false                   # paste your Upstash Redis URL here
      - key: SECRET_KEY
        generateValue: true           # Render generates a secure random value
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false                   # e.g. https://your-app.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false                   # same as CORS_ALLOWED_ORIGINS
      - key: DEBUG
        value: "False"

  # ── Celery worker (processes payouts in the background) ───────────────────────
  - type: worker
    name: playto-celery-worker
    env: docker
    rootDir: backend
    plan: starter                     # workers need at least starter plan on Render
    dockerCommand: celery -A playto worker -l info -c 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"

  # ── Celery beat (runs scheduled tasks: retry stuck payouts, expire keys) ──────
  - type: worker
    name: playto-celery-beat
    env: docker
    rootDir: backend
    plan: starter
    dockerCommand: >
      celery -A playto beat -l info
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playto-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
